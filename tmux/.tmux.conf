# 继承现有环境变量
set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID'

# 保留 tmux 历史滚动能力，但隐藏滚动时右上角的位置提示
set -g mouse on

# 启用 OSC 52 剪贴板
set -g set-clipboard on
set -g allow-passthrough off

# 自动设置终端标题为当前 session 名称
set -g set-titles on
set -g set-titles-string "#S"

# 复制模式设置
setw -g mode-keys vi

# 滚轮向上时进入 copy-mode 浏览历史，但隐藏右上角的位置提示；
# 滚回到底部后自动退出 copy-mode。
unbind -T root WheelUpPane
unbind -T root MouseDrag1Pane
bind -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -eH }
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -MH }
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down

# 鼠标拖动选择时：
# - 如果当前就在底部，复制后退出 copy-mode，保持正常实时输出
# - 如果已经翻到历史位置，复制后留在当前位置，不要自动跳回底部
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane if-shell -F "#{==:#{scroll_position},0}" { send-keys -X copy-selection-and-cancel } { send-keys -X copy-selection }

# 键盘选择后复制不退出复制模式
bind -T copy-mode-vi Enter send-keys -X copy-selection
bind -T copy-mode-vi y send-keys -X copy-selection

# 将 Ctrl-o 改为 o
bind ^o send-keys o

# 让 prefix + C-r 变成重载配置，避免和 tmux-resurrect 默认恢复键撞车
bind C-r source-file ~/.tmux.conf \; display "tmux config reloaded :)"
bind r source-file ~/.tmux.conf \; display "tmux config reloaded :)"

# 设置分割快捷键
bind \\ split-window -h -c "#{pane_current_path}" # \ 为转移字符，要写两次
bind - split-window -v -c "#{pane_current_path}"

# 关闭会话快捷键
bind X confirm-before kill-session

# 没有延迟
set -s escape-time 0

# 这里要修改(alacritty 终端)，否则 neovim 中显示的颜色和打开tmux之后不一样
# 用 tmux-256color
set -g default-terminal "tmux-256color"

# 告诉 tmux alacritty 支持真彩色和光标形状变化
set -ga terminal-features ",alacritty:RGB:cstyle"

# plug manager
set -g @plugin 'tmux-plugins/tpm'

# better morden terminal support
set -g @plugin 'tmux-plugins/tmux-sensible'

#+--- Color Themes ---+
set -g @plugin "arcticicestudio/nord-tmux"

#+--- Ctrl-S/R keymap to save session ---+
set -g @plugin "tmux-plugins/tmux-resurrect"

# 恢复 vim/nvim 会话
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-restore 'R'

# 恢复更多程序
set -g @resurrect-processes 'ssh psql mysql sqlite3 "~python" "~python3" "~uvicorn" "~node" "~npm" "~pnpm" claude codex'

# 保存后自动清理旧快照
set -g @resurrect-hook-post-save-all 'bash ~/.local/bin/tmux-cleanup-snapshots.sh'

#+--- auto save session ---+
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-restore 'off' # auto restore off
set -g @continuum-save-interval '15' # auto save gap time (minute)

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
